<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Announcements · ClassBoard</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><div class="brand-mark">🎓</div>ClassBoard</div>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="announcements.html" class="active">Announcements</a>
      <a href="upload.html" id="nav-upload" style="display:none;">Upload</a>
    </nav>
    <div class="user-chip" id="user-chip"></div>
  </div>

  <div class="page" style="max-width: 720px;">
    <h1 style="font-size: 26px;">Announcements</h1>
    <p style="margin-top: 6px;">Everything the class needs to know.</p>

    <form id="new-announce-form" class="card mt-24" style="padding: 22px; display:none;">
      <div class="field">
        <label for="an-title">Title</label>
        <input id="an-title" type="text" required placeholder="e.g. Unit test tomorrow" />
      </div>
      <div class="field">
        <label for="an-body">Details</label>
        <textarea id="an-body" required placeholder="10:00 AM — bring a calculator"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Post announcement</button>
    </form>

    <div class="file-list mt-24" id="announce-list">
      <div class="empty-state">Loading…</div>
    </div>
  </div>

  <div id="toast-stack"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/announcements.js"></script>
</body>
</html>

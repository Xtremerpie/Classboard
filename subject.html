<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Subject · ClassBoard</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><div class="brand-mark">🎓</div>ClassBoard</div>
    <nav class="nav-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="announcements.html">Announcements</a>
      <a href="upload.html" id="nav-upload" style="display:none;">Upload</a>
    </nav>
    <div class="user-chip" id="user-chip"></div>
  </div>

  <div class="page">
    <a href="dashboard.html" class="muted" style="font-size: 13px;">← Back to dashboard</a>
    <h1 id="subject-title" style="font-size: 26px; margin-top: 10px;">Subject</h1>
    <p style="margin-top: 6px;" id="subject-count"></p>

    <div class="card search-bar mt-24">
      <span>🔍</span>
      <input type="text" id="search-input" placeholder="Search files in this subject…" />

    <div class="file-list" id="file-list">
      <div class="empty-state">Loading files…</div>
    </div>
  </div>

  <div id="toast-stack"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="js/subject.js"></script>

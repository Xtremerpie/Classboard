<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard · ClassBoard</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="topbar">
    <div class="brand"><div class="brand-mark">🎓</div>ClassBoard</div>
    <nav class="nav-links">
      <a href="dashboard.html" class="active">Dashboard</a>
      <a href="announcements.html">Announcements</a>
      <a href="upload.html" id="nav-upload" style="display:none;">Upload</a>
    </nav>
    <div class="user-chip" id="user-chip"></div>
  </div>

  <div class="page">
    <h1 id="greeting" style="font-size: 26px;">Welcome back</h1>
    <p style="margin-top: 6px;">Here's what's happening in your classroom.</p>

    <div class="stat-grid" id="stat-grid">
      <div class="card stat-card"><div class="num" id="stat-files">–</div><div class="label">Total files</div></div>
      <div class="card stat-card"><div class="num" id="stat-today">–</div><div class="label">Uploaded today</div></div>
      <div class="card stat-card"><div class="num" id="stat-subjects">–</div><div class="label">Subjects</div></div>
      <div class="card stat-card"><div class="num" id="stat-announcements">–</div><div class="label">Announcements</div></div>
    </div>

    <div class="section-head">
      <h2>Subjects</h2>
    </div>
    <div class="subject-grid" id="subject-grid">
      <div class="empty-state">Loading subjects…</div>
    </div>

    <div class="section-head">
      <h2>Pinned announcements</h2>
      <a href="announcements.html" class="see-all">See all →</a>
    </div>
    <div class="file-list" id="pinned-announcements">
      <div class="empty-state">Loading…</div>
    </div>

    <div class="section-head">
      <h2>Recent uploads</h2>
    </div>
    <div class="file-list" id="recent-uploads">
      <div class="empty-state">Loading…</div>
    </div>
  </div>

  <div id="toast-stack"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
